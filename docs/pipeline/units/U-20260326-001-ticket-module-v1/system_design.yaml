  notes: "第一版设计：先闭环核心工单能力，工作流对接延后。"

architecture_decisions:
  - decision_id: "AD-U-20260326-001-001"
    description: "新增独立业务模块 wmt-module-ticket，按 controller/service/dal 分层"
    rationale: "避免侵入 system 模块，降低耦合，便于后续与 BPM 逐步集成"
    tradeoffs:
      - "短期内会增加模块数量与维护成本"
      - "但业务边界更清晰，演进更稳"
    references:
      - "api_contract.yaml#interfaces"
  - decision_id: "AD-U-20260326-001-002"
    description: "接口统一采用 CommonResult 与 PageResult，Mapper 基于 BaseMapperX"
    rationale: "遵循 framework_policy 统一规范"
    tradeoffs:
      - "需要额外 VO 转换"
      - "但契约风格统一，便于治理"
    references:
      - "framework_policy.yaml@1.0"

