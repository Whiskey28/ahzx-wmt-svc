# WMT XXL-JOB Starter 配置示例
# 基于 wmt-spring-boot-starter-xxljob 的完整配置示例

# ==================== 基础配置 ====================
spring:
  application:
    name: wmt-xxljob-demo
  profiles:
    active: dev

# ==================== WMT XXL-JOB 配置 ====================
wmt:
  xxljob:
    # 是否启用XXL-JOB功能
    enabled: true
    
    # XXL-JOB配置
    config:
      # 是否启用
      enabled: true
      # 访问令牌（与调度中心配置一致）
      access-token: default_token
      # 管理端配置
      admin:
        # 调度中心地址
        addresses: http://localhost:8080/xxl-job-admin
        # 调度中心用户名
        username: admin
        # 调度中心密码
        password: admin
        # 连接超时时间（秒）
        connection-timeout: 30
        # 读取超时时间（秒）
        read-timeout: 30
        # 是否启用SSL
        ssl-enabled: false
        # SSL证书路径
        ssl-cert-path: 
        # SSL密钥路径
        ssl-key-path: 
        # SSL信任证书路径
        ssl-trust-cert-path: 
        # 是否启用SSL验证
        ssl-verify-peer: true
        # 是否启用SSL验证主机名
        ssl-verify-hostname: true
        # 是否启用管理端监控
        monitoring-enabled: true
        # 监控间隔（秒）
        monitoring-interval: 30
        # 是否启用管理端统计
        statistics-enabled: true
        # 统计保留天数
        statistics-retention: 30
        # 是否启用管理端告警
        alerting-enabled: true
        # 告警阈值（连接失败次数）
        alerting-threshold: 10
        # 告警重试次数
        alerting-retry-count: 3
        # 告警重试间隔（秒）
        alerting-retry-interval: 60
      # 执行器配置
      executor:
        # 执行器AppName（与调度中心注册名称一致）
        appname: wmt-xxljob-demo-executor
        # 执行器注册地址，为空则自动获取
        address: 
        # 执行器IP，为空则自动获取
        ip: 
        # 执行器端口
        port: 9999
        # 执行器日志路径
        logpath: ./logs/xxl-job
        # 执行器日志保留天数
        logretentiondays: 30
        # 执行器名称
        title: WMT XXL-JOB Executor
        # 执行器描述
        description: WMT XXL-JOB Executor for Demo
        # 执行器版本
        version: 1.0.0
        # 执行器作者
        author: WMT Team
        # 执行器邮箱
        email: support@wmt.com
        # 执行器电话
        phone: 13800138000
        # 执行器地址
        location: Beijing, China
        # 执行器状态
        status: 1
        # 执行器类型
        type: 1
        # 执行器优先级
        priority: 1
        # 执行器权重
        weight: 1
        # 执行器最大并发数
        max-concurrency: 10
        # 执行器超时时间（秒）
        timeout: 300
        # 执行器重试次数
        retry-count: 3
        # 执行器重试间隔（秒）
        retry-interval: 60
        # 执行器是否启用
        enabled: true
        # 执行器是否启用监控
        monitoring-enabled: true
        # 监控间隔（秒）
        monitoring-interval: 30
        # 执行器是否启用统计
        statistics-enabled: true
        # 统计保留天数
        statistics-retention: 30
        # 执行器是否启用告警
        alerting-enabled: true
        # 告警阈值（执行失败次数）
        alerting-threshold: 10
        # 告警重试次数
        alerting-retry-count: 3
        # 告警重试间隔（秒）
        alerting-retry-interval: 60
        # 执行器是否启用压缩
        compression-enabled: true
        # 压缩阈值（字节）
        compression-threshold: 1024
        # 压缩算法
        compression-algorithm: gzip
        # 执行器是否启用加密
        encryption-enabled: false
        # 加密密钥
        encryption-key: "your-encryption-key"
        # 加密算法
        encryption-algorithm: AES
        # 执行器是否启用签名
        signature-enabled: false
        # 签名密钥
        signature-key: "your-signature-key"
        # 签名算法
        signature-algorithm: HMAC-SHA256
    
    # 任务配置
    job:
      # 是否启用任务
      enabled: true
      # 任务类型：bean, method, script
      type: bean
      # 任务配置
      config:
        # 是否启用Bean任务
        bean-enabled: true
        # Bean任务扫描包路径
        bean-scan-packages:
          - com.wmt.demo.job
        # Bean任务命名规则
        bean-naming-rule: "JobHandler"
        # Bean任务方法命名规则
        bean-method-naming-rule: "execute"
        # Bean任务参数类型
        bean-param-types:
          - String
          - Integer
          - Long
          - Boolean
          - Double
          - Float
        # 是否启用方法任务
        method-enabled: true
        # 方法任务扫描包路径
        method-scan-packages:
          - com.wmt.demo.job
        # 方法任务命名规则
        method-naming-rule: "JobMethod"
        # 方法任务参数类型
        method-param-types:
          - String
          - Integer
          - Long
          - Boolean
          - Double
          - Float
        # 是否启用脚本任务
        script-enabled: true
        # 脚本任务类型
        script-types:
          - shell
          - python
          - javascript
          - groovy
          - ruby
          - perl
          - php
          - lua
          - tcl
          - awk
          - sed
        # 脚本任务执行器
        script-executors:
          - bash
          - python3
          - node
          - groovy
          - ruby
          - perl
          - php
          - lua
          - tcl
          - awk
          - sed
        # 脚本任务超时时间（秒）
        script-timeout: 300
        # 脚本任务重试次数
        script-retry-count: 3
        # 脚本任务重试间隔（秒）
        script-retry-interval: 60
        # 脚本任务是否启用监控
        script-monitoring-enabled: true
        # 监控间隔（秒）
        script-monitoring-interval: 30
        # 脚本任务是否启用统计
        script-statistics-enabled: true
        # 统计保留天数
        script-statistics-retention: 30
        # 脚本任务是否启用告警
        script-alerting-enabled: true
        # 告警阈值（脚本执行失败次数）
        script-alerting-threshold: 10
        # 告警重试次数
        script-alerting-retry-count: 3
        # 告警重试间隔（秒）
        script-alerting-retry-interval: 60
        # 脚本任务是否启用压缩
        script-compression-enabled: true
        # 压缩阈值（字节）
        script-compression-threshold: 1024
        # 压缩算法
        script-compression-algorithm: gzip
        # 脚本任务是否启用加密
        script-encryption-enabled: false
        # 加密密钥
        script-encryption-key: "your-encryption-key"
        # 加密算法
        script-encryption-algorithm: AES
        # 脚本任务是否启用签名
        script-signature-enabled: false
        # 签名密钥
        script-signature-key: "your-signature-key"
        # 签名算法
        script-signature-algorithm: HMAC-SHA256
    
    # 调度配置
    schedule:
      # 是否启用调度
      enabled: true
      # 调度类型：cron, fixed, delay
      type: cron
      # 调度配置
      config:
        # 是否启用Cron调度
        cron-enabled: true
        # Cron表达式
        cron-expression: "0 0 0 * * ?"
        # Cron时区
        cron-timezone: Asia/Shanghai
        # Cron是否启用
        cron-enabled: true
        # Cron是否启用监控
        cron-monitoring-enabled: true
        # 监控间隔（秒）
        cron-monitoring-interval: 30
        # Cron是否启用统计
        cron-statistics-enabled: true
        # 统计保留天数
        cron-statistics-retention: 30
        # Cron是否启用告警
        cron-alerting-enabled: true
        # 告警阈值（调度失败次数）
        cron-alerting-threshold: 10
        # 告警重试次数
        cron-alerting-retry-count: 3
        # 告警重试间隔（秒）
        cron-alerting-retry-interval: 60
        # 是否启用固定延迟调度
        fixed-delay-enabled: true
        # 固定延迟时间（秒）
        fixed-delay-time: 60
        # 固定延迟是否启用
        fixed-delay-enabled: true
        # 固定延迟是否启用监控
        fixed-delay-monitoring-enabled: true
        # 监控间隔（秒）
        fixed-delay-monitoring-interval: 30
        # 固定延迟是否启用统计
        fixed-delay-statistics-enabled: true
        # 统计保留天数
        fixed-delay-statistics-retention: 30
        # 固定延迟是否启用告警
        fixed-delay-alerting-enabled: true
        # 告警阈值（固定延迟调度失败次数）
        fixed-delay-alerting-threshold: 10
        # 告警重试次数
        fixed-delay-alerting-retry-count: 3
        # 告警重试间隔（秒）
        fixed-delay-alerting-retry-interval: 60
        # 是否启用延迟调度
        delay-enabled: true
        # 延迟时间（秒）
        delay-time: 30
        # 延迟是否启用
        delay-enabled: true
        # 延迟是否启用监控
        delay-monitoring-enabled: true
        # 监控间隔（秒）
        delay-monitoring-interval: 30
        # 延迟是否启用统计
        delay-statistics-enabled: true
        # 统计保留天数
        delay-statistics-retention: 30
        # 延迟是否启用告警
        delay-alerting-enabled: true
        # 告警阈值（延迟调度失败次数）
        delay-alerting-threshold: 10
        # 告警重试次数
        delay-alerting-retry-count: 3
        # 告警重试间隔（秒）
        delay-alerting-retry-interval: 60
    
    # 监控配置
    monitoring:
      # 是否启用XXL-JOB监控
      enabled: true
      # 监控间隔（秒）
      interval: 30
      # 是否启用XXL-JOB统计
      statistics-enabled: true
      # XXL-JOB统计保留天数
      statistics-retention: 30
      # 是否启用XXL-JOB告警
      alerting-enabled: true
      # XXL-JOB告警阈值配置
      alerting-thresholds:
        # 任务执行失败率阈值（百分比）
        job-execution-failure-rate: 5
        # 任务执行成功率阈值（百分比）
        job-execution-success-rate: 95
        # 任务执行可用性阈值（百分比）
        job-execution-availability: 99
        # 任务执行响应时间阈值（毫秒）
        job-execution-response-time: 1000
        # 任务执行超时率阈值（百分比）
        job-execution-timeout-rate: 5
        # 任务执行重试率阈值（百分比）
        job-execution-retry-rate: 10
        # 任务执行并发数阈值
        job-execution-concurrency: 100
        # 任务执行队列大小阈值
        job-execution-queue-size: 1000
        # 任务执行内存使用率阈值（百分比）
        job-execution-memory-usage: 80
        # 任务执行CPU使用率阈值（百分比）
        job-execution-cpu-usage: 80
        # 任务执行磁盘使用率阈值（百分比）
        job-execution-disk-usage: 80
        # 任务执行网络延迟阈值（毫秒）
        job-execution-network-latency: 1000
        # 任务执行数据库延迟阈值（毫秒）
        job-execution-database-latency: 1000
        # 任务执行消息队列延迟阈值（毫秒）
        job-execution-mq-latency: 1000
        # 任务执行Elasticsearch延迟阈值（毫秒）
        job-execution-elasticsearch-latency: 1000
      # 告警重试次数
      alerting-retry-count: 3
      # 告警重试间隔（秒）
      alerting-retry-interval: 60
      # 告警通知方式：email, sms, webhook
      alert-notification-types:
        - email
        - webhook
      # 告警通知配置
      alert-notification:
        # 邮件配置
        email:
          enabled: true
          smtp-host: smtp.gmail.com
          smtp-port: 587
          username: your-email@gmail.com
          password: your-password
          from: alerts@your-domain.com
          to:
            - admin@your-domain.com
            - devops@your-domain.com
          subject: "[WMT XXL-JOB] 任务调度监控告警"
        # Webhook配置
        webhook:
          enabled: true
          url: https://your-webhook-url.com/alerts
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer your-token
          timeout: 10
          retry-count: 3

# ==================== 数据源配置 ====================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wmt_xxljob?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

# ==================== Redis配置 ====================
spring:
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.wmt: DEBUG
    org.springframework.xxljob: DEBUG
    com.xxl.job: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: ./logs/wmt-xxljob-demo.log
    max-size: 100MB
    max-history: 30

# ==================== 监控配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,xxljob
  endpoint:
    health:
      show-details: when-authorized
    xxljob:
      enabled: true
  info:
    env:
      enabled: true
