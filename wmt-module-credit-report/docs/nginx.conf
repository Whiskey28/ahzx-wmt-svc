server {
    listen 7080;
    server_name _;

    # 前端静态资源（前端打包 basePath=/CreditServiceReport/）
    root /opt/nginx/html;
    index index.html;

    # 前端是 SPA：除静态资源外，fallback 到 index.html
    location /CreditServiceReport/ {
        alias /opt/nginx/html/CreditServiceReport/;
        try_files $uri $uri/ /CreditServiceReport/index.html;
    }

    # 后端接口反向代理（前端 VITE_API_URL=/admin-api）
    location /admin-api/ {
        proxy_pass         http://192.168.18.111:48080/admin-api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

