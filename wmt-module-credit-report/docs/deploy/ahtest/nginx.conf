server {
    listen 7080;
    server_name _;

    # 前端静态资源（前端打包 basePath=/CreditServiceReport/）
    root /usr/local/nginx/html;
    index index.html;

    # 注意：前端部署在子路径 /CreditServiceReport/ 下时，若积木相关页面/资源被拼成
    # /CreditServiceReport/jmreport|jimubi|drag/... 会被 SPA 的 try_files 吞掉并回落到 index.html，
    # 表现为“进入报表设计器又回到登录页/白屏/资源 404”。
    # 解决：在 SPA location 之前，显式反代并去掉 /CreditServiceReport 前缀。
    location ^~ /CreditServiceReport/jmreport/ {
        rewrite ^/CreditServiceReport(/jmreport/.*)$ $1 break;
        proxy_pass         http://192.168.18.111:48080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location ^~ /CreditServiceReport/drag/ {
        rewrite ^/CreditServiceReport(/drag/.*)$ $1 break;
        proxy_pass         http://192.168.18.111:48080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location ^~ /CreditServiceReport/jimubi/ {
        rewrite ^/CreditServiceReport(/jimubi/.*)$ $1 break;
        proxy_pass         http://192.168.18.111:48080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 前端是 SPA：除静态资源外，fallback 到 index.html
    location /CreditServiceReport/ {
        alias /usr/local/nginx/html/CreditServiceReport/;
        try_files $uri $uri/ /CreditServiceReport/index.html;
    }

    # 后端接口反向代理（前端 VITE_API_URL=/admin-api）
    location /admin-api/ {
        proxy_pass         http://192.168.18.111:48080/admin-api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 积木报表（JMReport）相关入口：必须反代到后端，否则会被当成静态资源导致 404
    location /jmreport/ {
        proxy_pass         http://192.168.18.111:48080/jmreport/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 积木仪表盘/大屏相关
    location /drag/ {
        proxy_pass         http://192.168.18.111:48080/drag/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location /jimubi/ {
        proxy_pass         http://192.168.18.111:48080/jimubi/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

