version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ahzx
      POSTGRES_PASSWORD: ahzx123456
      POSTGRES_DB: tdc-wmt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ahzx" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - ahc_net

volumes:
  postgres_data:
    driver: local

networks:
  ahc_net:
    driver: bridge
